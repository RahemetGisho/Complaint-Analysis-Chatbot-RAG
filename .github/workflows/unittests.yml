name: CI Pipeline

on:
  push:
    branches: ["EDA"]
  pull_request:
    branches: ["EDA"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Placeholder step
        run: echo "CI pipeline is working - tests will be added in later tasks"
